name: Security Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Daily scan at 04:00 JST
    - cron: "0 19 * * *"

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (PyPA CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc

  safety:
    name: safety check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safety
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Run safety check
        run: |
          pip install -e . 2>/dev/null || true
          safety check --json || true

  osv-scanner:
    name: OSV Scanner (Google)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
        continue-on-error: true

  # 注: secret-scan は GitHub native Secret Scanning + Push Protection に移行
  # （public リポは無料・200+ プロバイダーのトークンパターンをカバー）
  # 旧 gitleaks-action は組織アカウントで有料ライセンス必須化されたため撤去
